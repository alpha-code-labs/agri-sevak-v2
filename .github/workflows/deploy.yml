name: Test, Build & Deploy to AKS

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'gemini_responses/**'
      - 'evaluation/**'
      - '.gitignore'
      - 'LICENSE'

env:
  ACR_LOGIN_SERVER: kissanacr.azurecr.io
  RESOURCE_GROUP: kissan-rg

jobs:
  # ── Job 1: Run unit tests ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install -r webhook_receiver/requirements.txt
          pip install -r agent_worker/requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --ignore=tests/test_agent_integration.py -x

  # ── Job 2: Build & push Docker images ─────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name kissanacr

      - name: Build & push webhook-receiver
        uses: docker/build-push-action@v6
        with:
          context: .
          file: webhook_receiver/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/webhook-receiver:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/webhook-receiver:latest

      - name: Build & push agent-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: agent_worker/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/agent-worker:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/agent-worker:latest

  # ── Job 3: Deploy to AKS ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Update webhook-receiver deployment
        run: |
          kubectl set image deployment/webhook-receiver \
            webhook-receiver=${{ env.ACR_LOGIN_SERVER }}/webhook-receiver:${{ github.sha }} \
            -n kcc

      - name: Update text-worker deployment
        run: |
          kubectl set image deployment/text-worker \
            text-worker=${{ env.ACR_LOGIN_SERVER }}/agent-worker:${{ github.sha }} \
            -n kcc

      - name: Update image-worker deployment
        run: |
          kubectl set image deployment/image-worker \
            image-worker=${{ env.ACR_LOGIN_SERVER }}/agent-worker:${{ github.sha }} \
            -n kcc

      - name: Update voice-worker deployment
        run: |
          kubectl set image deployment/voice-worker \
            voice-worker=${{ env.ACR_LOGIN_SERVER }}/agent-worker:${{ github.sha }} \
            -n kcc

      - name: Verify rollouts
        run: |
          kubectl rollout status deployment/webhook-receiver -n kcc --timeout=120s
          kubectl rollout status deployment/text-worker -n kcc --timeout=300s
          kubectl rollout status deployment/image-worker -n kcc --timeout=300s
          kubectl rollout status deployment/voice-worker -n kcc --timeout=300s
