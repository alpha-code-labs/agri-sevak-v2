apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: text-worker-scaler
  namespace: kcc
  labels:
    app: text-worker
spec:
  scaleTargetRef:
    name: text-worker
  minReplicaCount: 2
  maxReplicaCount: 40
  pollingInterval: 15
  cooldownPeriod: 60
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kcc-event-hubs.servicebus.windows.net:9093
        consumerGroup: agent-workers
        topic: farmer-messages-text
        lagThreshold: "5"
        offsetResetPolicy: earliest
      authenticationRef:
        name: kcc-kafka-auth
