apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: webhook-receiver-hpa
  namespace: kcc
  labels:
    app: webhook-receiver
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: webhook-receiver
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
