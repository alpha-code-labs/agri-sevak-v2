apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-receiver
  namespace: kcc
  labels:
    app: webhook-receiver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-receiver
  template:
    metadata:
      labels:
        app: webhook-receiver
    spec:
      containers:
        - name: webhook-receiver
          image: kissanacr.azurecr.io/webhook-receiver:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: kcc-config
            - secretRef:
                name: kcc-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
