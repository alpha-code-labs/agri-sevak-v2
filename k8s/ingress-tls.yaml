apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kcc-ingress
  namespace: kcc
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - agri-sevak.centralindia.cloudapp.azure.com
      secretName: kcc-tls-secret
  rules:
    - host: agri-sevak.centralindia.cloudapp.azure.com
      http:
        paths:
          - path: /webhook
            pathType: Prefix
            backend:
              service:
                name: webhook-receiver
                port:
                  number: 80
          - path: /health
            pathType: Exact
            backend:
              service:
                name: webhook-receiver
                port:
                  number: 80
